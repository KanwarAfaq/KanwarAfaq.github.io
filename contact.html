<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <main class="content">
            <section id="contact">
                <h2>Get In Touch</h2>
                
                <div class="card">
                    <h3>Send Me a Message</h3>
                    <p>Have a project in mind or just want to say hi? Fill out the form below and it will be sent directly to my email!</p>
                    
                    <form action="https://formsubmit.co/your.email@example.com" method="POST" class="contact-form">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_next" value="https://yourusername.github.io/contact.html">
                        
                        <input type="text" name="name" placeholder="Your Name" required>
                        <input type="email" name="email" placeholder="Your Email Address" required>
                        <input type="text" name="subject" placeholder="Subject" required>
                        <textarea name="message" placeholder="Write your message here..." required></textarea>
                        
                        <button type="submit">Send Message</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Connect on Social Media</h3>
                    <p>You can also find me and view more of my work on these platforms:</p>
                    <div class="social-links">
                        <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
                        <a href="https://github.com/yourusername" target="_blank">GitHub</a>
                        <a href="https://twitter.com/yourhandle" target="_blank">Twitter / X</a>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
