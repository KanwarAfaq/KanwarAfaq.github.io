<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <main class="content">
            <section id="gallery">
                <h2>Project Gallery</h2>
                <p>Click on any image to view it full size.</p>

                <div class="gallery-grid">
                    <img src="Afaq.png" alt="Gallery Image 1" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="pola.jpg" alt="Gallery Image 2" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="images/afaq2.jpg" alt="Gallery Image 3" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="images/pola.jpeg" alt="Gallery Image 4" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="images/img5.jpg" alt="Gallery Image 5" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="images/img6.jpg" alt="Gallery Image 6" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="images/img7.jpg" alt="Gallery Image 7" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="images/img8.jpg" alt="Gallery Image 8" class="gallery-img" onclick="openLightbox(this.src)">
                    <img src="images/img9.jpg" alt="Gallery Image 9" class="gallery-img" onclick="openLightbox(this.src)">
                </div>
            </section>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" class="lightbox-content">
    </div>

    <script src="script.js"></script>
    
    <script>
        function openLightbox(imageSrc) {
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightbox-img').src = imageSrc;
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
